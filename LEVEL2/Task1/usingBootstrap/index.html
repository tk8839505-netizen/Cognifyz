<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">

      <h2 class="text-center mb-4">Responsive Grid Layout</h2>

      <div class="row">

        <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
           <div class="card h-100">
               <img src="images/laptop.jpg" class="card-img-top" alt="laptop">

               <div class="card-body">
                   <h5 class="card-title">Laptop</h5>

                   <p class="card-text">perfect for coding designing and gamming</p>

                   <a href="#" class="btn btn-primary">Read More</a>

               </div>

           </div>


        </div>
         
        <div class="col-sm-12 col-md-6 col-lg-4 mb-4">
         <div class="card h-100">

            <img src="images/mobile.jpg" alt="Mobile">

            <div class="card-body">

                <h5 class="card-title">Mobile</h5>

                <p class="card-text">
                    smart phone with performance and camera.
                </p>

                <a href="#" class="btn btn-success">Buy Now</a>
            </div>
         </div>
        </div>

             <div class="col-sm-12 col-md-6 col-lg-4 mb-4">

                <div class="card h-100">

                    <img src="images/headphone.jpg" class="card-img-top" alt="Headphone">

                    <div class="card-body">

                        <h5 class="card-title">Headphone</h5>

                        <p class="card-text">
                            Enjoy crystal clear sound with premium quality.
                        </p>

                        <a href="#" class="btn btn-danger">
                            Explore
                        </a>

                    </div>

                </div>

            </div>   



      </div>
    </div>
    


</body>
</html>
